repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: python3 -m ruff check --fix
        language: system
        types_or: [python]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: python3 -m ruff format
        language: system
        types_or: [python]
        require_serial: true
